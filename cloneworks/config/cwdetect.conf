# cwdetect configuration
# This file is a placeholder. cwdetect does not use a config file;
# all parameters are passed via command-line flags:
#   -i  input fragments file (from cwbuild)
#   -o  output clones file
#   -s  minimum similarity threshold [0.0 - 1.0]
#   -p  partition size (optional, for large datasets)
#   -t  number of threads (optional)
#   -ps pre-sorted flag (optional)
#
# Recommended thresholds from the paper:
#   Type-1/2: 1.0 (exact match on joined terms)
#   Type-3:   0.7 (70% similarity)
